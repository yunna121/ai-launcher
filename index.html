<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Inteplast AI Assistant</title>
    <style>
        body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f3f2f1; color: #323130; }
        .container { text-align: center; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 480px; width: 90%; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0078d4; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin-top: 0; font-size: 24px; }
        p { color: #605e5c; font-size: 15px; line-height: 1.6; }
        .btn { background-color: #0078d4; color: white !important; padding: 15px 35px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: 700; font-size: 18px; margin-top: 20px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(0,120,212,0.3); }
        .hidden { display: none; }
        .alert-title { color: #d83b01; font-weight: bold; font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Status A: Launching (Default) -->
        <div id="status-launching">
            <div class="loader"></div>
            <h2>Launching AI Assistant...</h2>
            <p>Please click <b>"Open"</b> in the browser prompt above.</p>
        </div>

        <!-- Status B: App Not Detected (Shows download) -->
        <div id="status-download" class="hidden">
            <div class="alert-title">Installation Required</div>
            <p>We couldn't detect the AI Assistant on your computer.<br>Please download and install the application to continue.</p>
            <a href="https://wpjk.sharepoint.com/sites/IPGSafetyHub/_layouts/15/guestaccess.aspx?e=vaH4jd&download=1&share=IQBva717FHFvSLJWKB-qkOXnAVSWv-WZsv3gxUBLak2eOEA" class="btn">Download Installer</a>
        </div>
    </div>

    <!-- Hidden iframe for silent protocol probing -->
    <iframe id="launch-probe" style="display:none;"></iframe>

    <script>
        (function () {
            var protocol = 'inteplast-ai://open';
            var hasBlurred = false;
            var isFailed = false;

            // Monitor if the window loses focus (triggered when browser prompt appears)
            window.onblur = function() {
                hasBlurred = true;
            };

            // When user returns to the browser from the prompt
            window.onfocus = function() {
                // Only redirect if a prompt actually appeared and it's not a failure case
                if (hasBlurred && !isFailed) {
                    setTimeout(function() {
                        window.location.href = "https://wpjk.sharepoint.com/sites/IPGSafetyHub/";
                    }, 500);
                }
            };

            function attemptLaunch() {
                // Use iframe for silent probing (prevents annoying error dialogs if app is missing)
                try {
                    document.getElementById('launch-probe').src = protocol;
                } catch (e) {}

                // Wait 2.5 seconds to check if any prompt appeared
                setTimeout(function () {
                    if (!hasBlurred) {
                        // 2.5 seconds with no prompt = assume app is not installed
                        isFailed = true;
                        document.getElementById('status-launching').classList.add('hidden');
                        document.getElementById('status-download').classList.remove('hidden');
                    }
                }, 2500);
            }

            window.onload = attemptLaunch;
        })();
    </script>
</body>
</html>
