<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteplast AI Assistant Launcher</title>
    <style>
        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f2f1;
            color: #323130;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 90%;
        }
        .icon { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0 0 10px 0; color: #0078d4; }
        p { color: #605e5c; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .btn {
            background-color: #0078d4;
            color: white !important;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .btn:hover { background-color: #005a9e; }
        .btn:active { transform: translateY(1px); }
        .btn-outline {
            background-color: transparent;
            color: #0078d4 !important;
            border: 1px solid #0078d4;
        }
        .btn-outline:hover { background-color: #f3f2f1; }
        .footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #edebe9;
            font-size: 13px;
            color: #a19f9d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🤖</div>
        <h1>AI Assistant</h1>
        <p>Attempting to launch the application. <br>If you see a prompt, please click <b>"Open"</b>.</p>

        <!-- Primary Action: Open the app -->
        <button onclick="launchApp()" class="btn">Launch Application</button>

        <!-- Secondary Action: Download if not installed -->
        <a href="https://wpjk.sharepoint.com/sites/IPGSafetyHub/_layouts/15/guestaccess.aspx?e=pMr1xF&download=1&share=IQBGBAgY14aoQJAxlKFf2jGVAUB0X0pcYV0SEnD2iW_hRj0" class="btn btn-outline">Download Installer (EXE)</a>

        <div class="footer">
            <p>Need help? Contact the IT Safety Support team.</p>
        </div>
    </div>

    <script>
        var protocol = 'inteplast-ai://open';
        var hasBlurred = false;

        // Detect if the "Open App" prompt appeared
        window.onblur = function() {
            hasBlurred = true;
        };

        // Detect when user comes back after clicking "Open"
        window.onfocus = function() {
            if (hasBlurred) {
                // If they successfully launched, wait a bit and go back to SharePoint
                setTimeout(function() {
                    window.location.href = "https://wpjk.sharepoint.com/sites/IPGSafetyHub/";
                }, 500);
            }
        };

        function launchApp() {
            window.location.href = protocol;
        }

        // Auto-launch once when page loads
        window.onload = function() {
            setTimeout(launchApp, 800);
        };
    </script>
</body>
</html>
